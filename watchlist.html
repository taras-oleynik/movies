<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Watchlist</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>My Watchlist</h1>
      </div>
      <a href="index.html" class="watchlist-link">Search for movies</a>
    </header>

    <!-- WATCHLIST FILLED -->
    <div class="movies" id="watchlistMovies"></div>

    <!-- Watchlist card template (cloned by JS) -->
    <template id="watchlistTemplate">
      <div class="movie">
        <img src="" alt="" />
        <div class="movie-info">
          <div class="title-row">
            <h3></h3>
            <span class="rating"></span>
          </div>

          <div class="meta">
            <span class="runtime"></span>
            <span class="genre"></span>
            <button class="watchlist-btn" type="button">- Remove</button>
          </div>

          <p class="plot"></p>
        </div>
      </div>
      <hr />
    </template>

    <!-- EMPTY WATCHLIST -->
    <div class="empty hidden">
      <p>Your watchlist is looking a little empty...</p>
      <a href="index.html" class="add-link">Let’s add some movies!</a>
    </div>

    <script src="watchlist.js"></script>
  </body>
</html>
