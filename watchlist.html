<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Watchlist</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>My Watchlist</h1>
      </div>
      <a href="index.html" class="watchlist-link">Search for movies</a>
    </header>

    <!-- WATCHLIST FILLED -->
    <div class="movies">
      <div class="movie">
        <img src="https://via.placeholder.com/100x150" alt="" />
        <div class="movie-info">
          <div class="title-row">
            <h3>Blade Runner 2049</h3>
            <span class="rating">⭐ 8.0</span>
          </div>

          <div class="meta">
            <span>164 min</span>
            <span>Action, Drama, Mystery</span>
            <button class="watchlist-btn">- Remove</button>
          </div>

          <p>Young Blade Runner K's discovery of a long-buried secret...</p>
        </div>
      </div>
    </div>

    <!-- EMPTY WATCHLIST -->
    <div class="empty hidden">
      <p>Your watchlist is looking a little empty...</p>
      <a href="index.html" class="add-link">Let’s add some movies!</a>
    </div>
  </body>
</html>
