<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Find your film</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>Find your film</h1>
      </div>
      <a href="watchlist.html" class="watchlist-link">My Watchlist</a>
    </header>

    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Blade Runner" />
      <button id="searchBtn">Search</button>
    </div>

    <!-- RESULTS STATE -->
    <div class="movies" id="movies"></div>

    <!-- Movie card template (cloned by JS) -->
    <template id="movieTemplate">
      <div class="movie">
        <img src="" alt="" />
        <div class="movie-info">
          <div class="title-row">
            <h3></h3>
            <span class="rating"></span>
          </div>
          <div class="meta">
            <span class="runtime"></span>
            <span class="genre"></span>
            <button class="watchlist-btn" type="button">+ Watchlist</button>
          </div>
          <p class="plot"></p>
        </div>
      </div>
      <hr />
    </template>

    <!-- EMPTY RESULT STATE -->
    <div class="empty hidden">
      <p>Unable to find what you’re looking for. Please try another search.</p>
    </div>

    <script src="index.js"></script>
  </body>
</html>
